<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encurtador de Links - API da.gd</title>
    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #202024;
            --text-color: #e1e1e6;
            --primary-color: #8257e5;
            --primary-hover: #9466ff;
            --error-color: #f75a68;
            --success-color: #00b37e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 500px;
        }

        h1 {
            text-align: center;
            margin-bottom: 24px;
            font-size: 24px;
        }

        .input-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 4px;
            border: 1px solid #323238;
            background-color: #121214;
            color: var(--text-color);
            font-size: 16px;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 4px;
            background-color: var(--primary-color);
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 8px;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:disabled {
            background-color: #555;
            cursor: not-allowed;
        }

        .result-container {
            margin-top: 24px;
            padding: 16px;
            background-color: #121214;
            border: 1px solid var(--success-color);
            border-radius: 4px;
            display: none;
            text-align: center;
        }

        .result-container a {
            color: var(--success-color);
            font-size: 18px;
            font-weight: bold;
            text-decoration: none;
            word-break: break-all;
        }

        .copy-btn {
            background-color: #323238;
            margin-top: 12px;
            padding: 8px;
            font-size: 14px;
        }

        .copy-btn:hover {
            background-color: #4a4a50;
        }

        .error-message {
            color: var(--error-color);
            margin-top: 16px;
            text-align: center;
            font-size: 14px;
            display: none;
        }

        .loader {
            display: none;
            text-align: center;
            margin-top: 16px;
            font-size: 14px;
            color: #a8a8b3;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Encurtador de Links</h1>
        
        <div class="input-group">
            <label for="originalUrl">URL Original (Obrigatório)</label>
            <input type="url" id="originalUrl" placeholder="https://exemplo.com" required>
        </div>

        <div class="input-group">
            <label for="customAlias">Alias Personalizado (Opcional)</label>
            <input type="text" id="customAlias" placeholder="meu-link-top" pattern="[a-zA-Z0-9_-]+">
            <small style="color: #a8a8b3; font-size: 12px; display: block; margin-top: 4px;">Apenas letras, números, traços e underlines.</small>
        </div>

        <button id="shortenBtn" onclick="shortenUrl()">Encurtar URL</button>
        
        <div id="loader" class="loader">Encurtando...</div>
        <div id="errorMessage" class="error-message"></div>

        <div id="resultContainer" class="result-container">
            <p style="margin-bottom: 8px; font-size: 14px;">Seu link encurtado:</p>
            <a href="#" id="shortenedUrl" target="_blank"></a>
            <button class="copy-btn" onclick="copyToClipboard()">Copiar Link</button>
        </div>
    </div>

    <script>
        async function shortenUrl() {
            const originalUrlInput = document.getElementById('originalUrl').value.trim();
            const customAliasInput = document.getElementById('customAlias').value.trim();
            const btn = document.getElementById('shortenBtn');
            const loader = document.getElementById('loader');
            const errorMessage = document.getElementById('errorMessage');
            const resultContainer = document.getElementById('resultContainer');
            const shortenedUrlEl = document.getElementById('shortenedUrl');

            // Limpa a interface
            errorMessage.style.display = 'none';
            resultContainer.style.display = 'none';

            if (!originalUrlInput) {
                showError('Por favor, insira uma URL válida.');
                return;
            }

            if (!/^https?:\/\//i.test(originalUrlInput)) {
                showError('A URL deve começar obrigatoriamente com http:// ou https://');
                return;
            }

            // Constrói a URL da API conforme solicitado
            let daGdApiUrl = `https://da.gd/s?url=${encodeURIComponent(originalUrlInput)}`;
            if (customAliasInput) {
                daGdApiUrl += `&shorturl=${encodeURIComponent(customAliasInput)}`;
            }

            btn.disabled = true;
            loader.style.display = 'block';

            try {
                let finalUrl = '';

                try {
                    // TENTATIVA 1: Conexão Direta (O mais puro e rápido)
                    const directResponse = await fetch(daGdApiUrl);
                    if (directResponse.ok) {
                        finalUrl = await directResponse.text();
                    } else {
                        throw new Error("Falha na direta");
                    }
                } catch (e) {
                    // TENTATIVA 2: Se o GitHub Pages/SPCK Editor bloquear, usa o túnel puro (/raw)
                    const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(daGdApiUrl)}`;
                    const proxyResponse = await fetch(proxyUrl);
                    if (proxyResponse.ok) {
                        finalUrl = await proxyResponse.text();
                    } else {
                        throw new Error("Falha no proxy");
                    }
                }

                // Limpa espaços vazios
                finalUrl = finalUrl.trim();

                // Tratamento de mensagens de erro específicas da API da.gd
                if (finalUrl.toLowerCase().includes('error') || finalUrl.toLowerCase().includes('invalid')) {
                    showError(`A API recusou: O alias "${customAliasInput}" já está em uso ou a URL original é inválida.`);
                } else if (!finalUrl) {
                    showError('Falha ao gerar o link. O servidor não retornou resposta.');
                } else {
                    // Exibe o link final formatado
                    shortenedUrlEl.href = finalUrl;
                    shortenedUrlEl.textContent = finalUrl;
                    resultContainer.style.display = 'block';
                }

            } catch (error) {
                showError('Falha total na conexão. Verifique sua internet.');
            } finally {
                btn.disabled = false;
                loader.style.display = 'none';
            }
        }

        function showError(msg) {
            const errorMessage = document.getElementById('errorMessage');
            errorMessage.textContent = msg;
            errorMessage.style.display = 'block';
        }

        function copyToClipboard() {
            const urlToCopy = document.getElementById('shortenedUrl').textContent;
            navigator.clipboard.writeText(urlToCopy).then(() => {
                const copyBtn = document.querySelector('.copy-btn');
                const originalText = copyBtn.textContent;
                copyBtn.textContent = 'Copiado!';
                copyBtn.style.backgroundColor = 'var(--success-color)';
                
                setTimeout(() => {
                    copyBtn.textContent = originalText;
                    copyBtn.style.backgroundColor = '#323238';
                }, 2000);
            }).catch(err => {
                console.error('Erro ao copiar: ', err);
            });
        }
    </script>
</body>
</html>
