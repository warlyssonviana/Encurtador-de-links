<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encurtador de Links</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; }
        body { background-color: #121214; color: #e1e1e6; display: flex; justify-content: center; align-items: center; height: 100vh; padding: 20px; }
        .container { background-color: #202024; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); width: 100%; max-width: 400px; text-align: center; }
        h1 { margin-bottom: 20px; font-size: 22px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 4px; border: 1px solid #323238; background-color: #121214; color: #fff; font-size: 16px; }
        input:focus { outline: none; border-color: #8257e5; }
        button { width: 100%; padding: 12px; background-color: #8257e5; color: white; border: none; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background-color: #9466ff; }
        #loader { display: none; margin-top: 15px; font-size: 14px; color: #a8a8b3; }
        #resultado { margin-top: 20px; display: none; }
        #link-gerado { color: #00b37e; font-size: 18px; font-weight: bold; text-decoration: none; word-break: break-all; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Encurtador de Links</h1>
        
        <input type="url" id="urlOriginal" placeholder="Cole seu link longo aqui" required>
        <input type="text" id="alias" placeholder="Nome personalizado (Opcional)">
        
        <button onclick="encurtarLink()">Encurtar Link</button>
        
        <div id="loader">Aguarde, gerando link...</div>
        
        <div id="resultado">
            <p style="margin-bottom: 10px; font-size: 14px;">Link pronto:</p>
            <a href="#" id="link-gerado" target="_blank"></a>
        </div>
    </div>

    <script>
        async function encurtarLink() {
            const urlOriginal = document.getElementById('urlOriginal').value.trim();
            const alias = document.getElementById('alias').value.trim();
            const resultadoDiv = document.getElementById('resultado');
            const linkGerado = document.getElementById('link-gerado');
            const loader = document.getElementById('loader');

            if (!urlOriginal) {
                alert("Por favor, insira um link para encurtar.");
                return;
            }

            resultadoDiv.style.display = 'none';
            loader.style.display = 'block';

            // Monta a URL da API
            let apiUrl = `https://da.gd/s?url=${encodeURIComponent(urlOriginal)}`;
            if (alias) {
                apiUrl += `&shorturl=${encodeURIComponent(alias)}`;
            }

            // Proxy embutido limpo (o mesmo formato usado pela IA do vídeo)
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(apiUrl)}`;

            try {
                const response = await fetch(proxyUrl);
                const data = await response.json();
                const linkFinal = data.contents.trim();

                if (linkFinal.includes('error') || linkFinal.includes('invalid') || linkFinal === '') {
                    alert("Erro: O nome personalizado já está em uso ou o link longo é inválido. Tente outro.");
                } else {
                    linkGerado.href = linkFinal;
                    linkGerado.textContent = linkFinal;
                    resultadoDiv.style.display = 'block';
                }
            } catch (error) {
                alert("Erro ao conectar com o servidor. Tente novamente.");
            } finally {
                loader.style.display = 'none';
            }
        }
    </script>

</body>
</html>
